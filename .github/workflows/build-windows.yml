name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Windows EXE
      run: python build_windows.py

    - name: Install NSIS
      run: |
        $nsis_url = "https://sourceforge.net/projects/nsis/files/NSIS%203/3.09/nsis-3.09-setup.exe/download"
        Invoke-WebRequest -Uri $nsis_url -OutFile nsis-installer.exe
        & .\nsis-installer.exe /S
        del nsis-installer.exe
      shell: powershell

    - name: Build Windows Installer
      run: |
        & "C:\Program Files (x86)\NSIS\makensis.exe" /V2 installer.nsi
      shell: powershell

    - name: Upload EXE to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: MagicButton-Windows-EXE
        path: dist/MagicButton.exe

    - name: Upload Installer to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: MagicButton-Windows-Installer
        path: MagicButton-Installer.exe
